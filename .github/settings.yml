# Org-level settings applied to all repositories in the organization.
# See https://github.com/github/safe-settings for full documentation.

# Default repository settings applied to every repo in the org
repository:
  # A short description applied to repositories by default
  description: Managed by safe-settings

  # Enable vulnerability alerts (Dependabot)
  security:
    enableVulnerabilityAlerts: true
    enableAutomatedSecurityFixes: true

  # Repositories are private by default
  private: true
  visibility: private

  # Enable common collaboration features
  has_issues: true
  has_projects: true
  has_wiki: false

  # Default branch name
  default_branch: main

  # Merge strategy settings
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  allow_auto_merge: true
  delete_branch_on_merge: true

  # Keep repos active (not archived)
  archived: false

# Labels applied to all repositories in the org
labels:
  include:
    - name: bug
      color: "CC0000"
      description: Something isn't working

    - name: enhancement
      color: "84b6eb"
      description: New feature or request

    - name: documentation
      color: "0075ca"
      description: Improvements or additions to documentation

    - name: good first issue
      color: "7057ff"
      description: Good for newcomers

    - name: help wanted
      color: "008672"
      description: Extra attention is needed

    - name: question
      color: "d876e3"
      description: Further information is requested

  exclude:
    # Don't delete any labels that start with "release"
    - name: ^release

# Branch protection rules applied to all repositories
branches:
  # "default" applies the rule to the repo's default branch
  - name: default
    protection:
      # Require at least one approving review before merging
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
        bypass_pull_request_allowances:
          apps: []
          users: []
          teams: []
        dismissal_restrictions:
          users: []
          teams: []
      # Require status checks to pass before merging
      required_status_checks:
        strict: true
        contexts: []
      # Enforce restrictions for administrators as well
      enforce_admins: true
      # Restrict direct pushes (allow only PRs)
      restrictions:
        apps: []
        users: []
        teams: []
